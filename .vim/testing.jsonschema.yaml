$schema: http://json-schema.org/draft-07/schema#
title: Testing kb item frontmatter
type: object
properties:
  last-tested:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: ISO date of the most recent run.
  result:
    type: string
    enum: [pass, partial, fail]
    description: Outcome of the most recent run.
  scope:
    type: string
    description: Short identifier of the surface being exercised (e.g. nvim-startup, conform.nvim, mason).
required:
  - last-tested
  - result
  - scope
additionalProperties: false
