model_list:
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Convenience alias so OpenAI clients that hardcode "gpt-4o" still work.
  - model_name: gpt-4o
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true            # silently drop OpenAI-only params Anthropic doesn't accept
  set_verbose: false

general_settings:
  # No master key by default — bind to loopback only (see launch command).
  # Add `master_key: sk-...` here if you want auth.
