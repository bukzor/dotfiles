# Tool cost/benefit estimates
# See: benefit = enablement × turn_efficiency × accuracy_boost × (1 - penalty)
# Cost in kB (.md file size + call_kb × frequency)

essentiality: 0.9       # When structured output needed, essential
frequency: 0.05         # Rare - programmatic use
turns_with: 1           # Direct structured return
turns_without: 3        # Manual JSON formatting
error_with: 0.05        # Schema mismatches
error_without: 0.2      # Manual formatting error-prone
substitutability: 0.6   # Can format in text
call_kb: 2              # Structured response
