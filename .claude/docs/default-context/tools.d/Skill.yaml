# Tool cost/benefit estimates
# See: benefit = enablement × turn_efficiency × accuracy_boost × (1 - penalty)
# Cost in kB (.md file size + call_kb × frequency)

essentiality: 0.85      # When skill needed, usually right tool
frequency: 0.1          # Occasional specialized tasks
turns_with: 1           # Single invocation
turns_without: 5        # Would need manual skill prompts
error_with: 0.05        # Skill loading failures
error_without: 0.2      # Manual methods more error-prone
substitutability: 0.4   # Can manually expand skills
call_kb: 2              # Skill expansion
