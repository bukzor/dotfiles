# Tool cost/benefit estimates
# See: benefit = enablement × turn_efficiency × accuracy_boost × (1 - penalty)
# Cost in kB (.md file size + call_kb × frequency)

essentiality: 0.95      # When needed, essential
frequency: 0.02         # Very rare
turns_with: 1           # Direct kill
turns_without: 3        # Manual kill via Bash
error_with: 0.01        # Rarely fails
error_without: 0.2      # Bash kill can miss
substitutability: 0.6   # Bash kill can work
call_kb: 0.1            # Just status
