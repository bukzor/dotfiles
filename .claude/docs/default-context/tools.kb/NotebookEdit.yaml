# Tool cost/benefit estimates
# See: benefit = enablement × turn_efficiency × accuracy_boost × (1 - penalty)
# Cost in kB (.md file size + call_kb × frequency)

essentiality: 0.95      # When editing notebooks, essential
frequency: 0.05         # Rare - only Jupyter work
turns_with: 1           # Direct cell edit
turns_without: 4        # JSON manipulation via Edit
error_with: 0.05        # Some failures possible
error_without: 0.3      # JSON editing very error-prone
substitutability: 0.4   # Edit can work but complex
call_kb: 0.5            # Just confirms edit
