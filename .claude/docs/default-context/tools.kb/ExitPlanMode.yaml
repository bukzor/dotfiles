# Tool cost/benefit estimates
# See: benefit = enablement × turn_efficiency × accuracy_boost × (1 - penalty)
# Cost in kB (.md file size + call_kb × frequency)

essentiality: 0.8       # When in plan mode, needed to exit
frequency: 0.05         # Follows EnterPlanMode
turns_with: 1           # Mode switch
turns_without: 2        # Would need user to exit manually
error_with: 0.02        # Rarely fails
error_without: 0.1      # Manual exit less smooth
substitutability: 0.6   # User can exit manually
call_kb: 0.2            # Just mode confirmation
