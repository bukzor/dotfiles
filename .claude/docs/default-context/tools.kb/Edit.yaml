# Tool cost/benefit estimates
# See: benefit = enablement × turn_efficiency × accuracy_boost × (1 - penalty)
# Cost in kB (.md file size + call_kb × frequency)

essentiality: 0.95      # When editing, almost always the right tool
frequency: 0.6          # Most coding tasks involve editing
turns_with: 1           # Direct edit
turns_without: 4        # Would need Write (full file) or sed/awk via Bash
error_with: 0.05        # Failures on non-unique strings
error_without: 0.25     # Write overwrites entire file, sed/awk complex
substitutability: 0.5   # Write can substitute for many cases
call_kb: 0.5            # Just confirms the edit
