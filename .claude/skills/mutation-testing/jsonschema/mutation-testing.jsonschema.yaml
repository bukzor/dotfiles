# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
$schema: "https://json-schema.org/draft/2020-12/schema"
title: Mutation Testing
description: Tracks planned code mutations for post-hoc TDD

type: object
required: [status]
additionalProperties: false

properties:
  status:
    type: string
    enum: [todo, done, gap, equivalent]
    description: |
      todo -- not yet attempted
      done -- tests reliably catch this mutation
      gap -- unable to harden tests (deferred to Opus)
      equivalent -- mutation doesn't change behavior (not a bug); may reveal redundant code
  attempts:
    type: integer
    minimum: 0
    description: Number of strengthening attempts (for gap or equivalent)
