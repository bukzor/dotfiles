$schema: https://json-schema.org/draft/2020-12/schema
title: Session entry frontmatter
description: |
  Frontmatter schema for entries in sessions.kb/. Each entry tracks
  one claude-code session -- in flight, planned, or recently relevant.
  Helps the user keep track of many parallel lines of work.

type: object
required: [cwd, session]
additionalProperties: false

properties:
  cwd:
    type: string
    pattern: '^/'
    description: |
      Absolute working directory where this session runs (or will run).
      Sessions in different cwds are different lines of work even if the
      topic overlaps.

  color:
    type: string
    enum: [red, blue, green, yellow, purple, orange, pink, cyan, default]
    description: |
      Session color label set via /color, matching the available palette.
      Optional; omit when the session has not been colored.

  focus:
    type: array
    items:
      type: string
    description: |
      File(s) used for agent initialization -- the priming reads that
      orient the agent to this session's task. Paths may be absolute
      or relative to `cwd`. Optional: omit when the session needs no
      seed material beyond the entry body itself.

  session:
    type: object
    required: [started, ended]
    additionalProperties: false
    properties:
      uuid:
        type: string
        pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
        description: |
          The claude-code session UUID
          ($CLAUDE_CODE_SESSION_ID). Absent for planned or proposed
          sessions that have not been started yet.
      started:
        type: [instant, "null"]
        description: |
          When the session became active. Required; null is
          load-bearing -- means the session is planned but has not
          yet begun.
      ended:
        type: [instant, "null"]
        description: |
          When the session terminated. Required; null is load-bearing
          -- means the session is still in flight or its end was not
          recorded.
