name: Check sh

on: [push, pull_request]

jobs:
  test:
    name: shell test matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # full history + all branches: reunify-dotfiles task 001's
          # cross-branch identity check needs origin/main and
          # origin/svelte-crostini both reachable
          fetch-depth: 0

      - name: Install shells
        run: sudo apt-get update && sudo apt-get install -y dash busybox zsh

      - name: Run shell test matrix
        # vendored minimal/do: no redo install needed (serial, but the
        # matrix is ~2s; installing real redo cost 30s)
        run: ./.local/share/redo/do test
